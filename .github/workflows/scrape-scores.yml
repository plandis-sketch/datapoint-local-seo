name: Scrape Golf Scores

# IMPORTANT: This workflow file must exist on the default branch (main) for
# the cron schedule to trigger. Copy this file to main, or merge this branch.

on:
  schedule:
    # Every 5 minutes during tournament days (Thu-Sun), 7am-9pm ET (11:00-01:00 UTC)
    # This conserves GitHub Actions minutes by only running during play hours
    - cron: '*/5 11-23 * * 4,5,6'  # Thu-Sat 7am-7pm ET
    - cron: '*/5 0-1 * * 5,6,0'    # Fri-Sun midnight-9pm ET (overflow)
    - cron: '*/5 11-23 * * 0'       # Sun 7am-7pm ET
    - cron: '*/5 0-1 * * 1'         # Mon midnight-1am ET (Sun overflow)
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout golf pool branch
        uses: actions/checkout@v4
        with:
          ref: claude/shipper-app-export-qmJCo

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: node scripts/scrape-scores.js --once
